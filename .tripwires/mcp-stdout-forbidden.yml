context: |
  CRITICAL: This is an MCP server using stdio transport.
  NEVER use console.log() — stdout is the JSON-RPC protocol stream.
  All logging MUST use console.error() (stderr).
  A single console.log() will corrupt the protocol and crash the connection.

severity: critical
